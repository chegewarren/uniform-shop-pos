<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--navy:#0f1e3d;--gold:#f0a500;--gold2:#ffc93c;--green:#00c48c;--red:#ff4d6d;--bg:#080f20;--card:#111d38;--card2:#162040;--border:#1e2f52;--text:#e8edf8;--muted:#6b7fa8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;--h:60px;--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100%;}
.topbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 16px;height:var(--h);display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;}
.tl{display:flex;align-items:center;gap:12px;}
.back{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.pt{font-size:15px;font-weight:700;}.ps{font-size:10px;color:var(--muted);}
.tr{display:flex;gap:8px;}
.ib{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ib:hover{border-color:var(--gold);color:var(--gold);}
.main{margin-top:var(--h);padding:18px 16px calc(24px + var(--sb));max-width:900px;margin-left:auto;margin-right:auto;}
.tabs{display:flex;gap:8px;margin-bottom:18px;}
.tab{padding:7px 16px;border-radius:18px;font-size:13px;font-weight:600;text-decoration:none;color:var(--muted);border:1px solid var(--border);background:var(--card);}
.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.add-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px;}
.add-title{font-size:14px;font-weight:700;margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{margin-bottom:11px;}
.fl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px;display:block;}
.fi,.fsel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s;}
.fi:focus,.fsel:focus{border-color:var(--gold);}
.fi::placeholder{color:var(--muted);}
.add-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;border-radius:9px;padding:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.fsel2,.fdate{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;}
.fdate{flex:1;min-width:0;}
.load-btn{background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:9px 14px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;}
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;}
.sum-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.sum-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--gold);}
.sum-val.r{color:var(--red);}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.exp-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.ei{font-size:20px;flex-shrink:0;}
.einf{flex:1;min-width:0;}
.edesc{font-size:14px;font-weight:600;}
.ecat{font-size:11px;color:var(--muted);margin-top:1px;}
.enote{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.etime{font-size:11px;color:var(--muted);margin-top:3px;}
.er{text-align:right;flex-shrink:0;}
.eamt{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--red);}
.edel{background:none;border:1px solid rgba(255,77,109,.3);border-radius:7px;color:var(--red);font-size:11px;cursor:pointer;padding:3px 8px;margin-top:5px;font-family:var(--font);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .icon{font-size:40px;margin-bottom:10px;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(20px + var(--sb));left:16px;right:16px;background:var(--card);border:1px solid var(--green);border-radius:13px;padding:13px 16px;font-size:14px;text-align:center;transform:translateY(80px);opacity:0;transition:all .3s;z-index:2000;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-color:var(--red);}
.print-header{display:none;text-align:center;margin-bottom:16px;}
@media print{body{background:#fff;color:#000;}.topbar,.tabs,.add-card,.filter-bar,.tr,.ib,.edel{display:none!important;}.main{margin-top:0;padding:16px;}.print-header{display:block!important;}.exp-card{border:1px solid #ccc;break-inside:avoid;background:#fff;}.eamt{color:#c00;}}
@media(min-width:700px){.main{padding:26px;}.sum-row{grid-template-columns:repeat(4,1fr);}.form-row{grid-template-columns:2fr 1fr 1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">
    <a class="back" href="/">‹</a>
    <div><div class="pt">💸 Expenses</div><div class="ps" id="bizSub">—</div></div>
  </div>
  <div class="tr">
    <button class="ib" onclick="printPage()" title="Print">🖨️</button>
    <button class="ib" onclick="downloadPDF()" title="PDF">⬇️</button>
  </div>
</div>

<div class="main">
  <div class="print-header" id="ph"><h2 id="phBiz">Expenses</h2><p id="phP">—</p><p id="phD">—</p></div>
  <div class="tabs">
    <a class="tab" href="/sales">Sales Records</a>
    <a class="tab active" href="/expenses">Expenses</a>
  </div>

  <div class="add-card">
    <div class="add-title">➕ Add Expense</div>
    <div class="form-row"><div class="fg" style="grid-column:1/-1"><label class="fl">Description *</label><input class="fi" id="eDesc" type="text" placeholder="e.g. Rent, Stock purchase…"/></div></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Amount (KES) *</label><input class="fi" id="eAmt" type="number" placeholder="0" min="1"/></div>
      <div class="fg"><label class="fl">Category</label>
        <select class="fsel" id="eCat">
          <option>General</option><option>Rent</option><option>Stock / Inventory</option>
          <option>Transport</option><option>Salaries</option><option>Utilities</option>
          <option>Marketing</option><option>Equipment</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">Note (optional)</label><input class="fi" id="eNote" type="text" placeholder="Extra details…"/></div>
    <button class="add-btn" id="addBtn" onclick="addExpense()">Record Expense</button>
  </div>

  <div class="filter-bar">
    <select class="fsel2" id="pSel" onchange="onPChange()">
      <option value="daily">Daily</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option>
    </select>
    <input class="fdate" type="date" id="dIn" style="display:none"/>
    <select class="fsel2" id="mSel" style="display:none">
      <option value="1">January</option><option value="2">February</option><option value="3">March</option>
      <option value="4">April</option><option value="5">May</option><option value="6">June</option>
      <option value="7">July</option><option value="8">August</option><option value="9">September</option>
      <option value="10">October</option><option value="11">November</option><option value="12">December</option>
    </select>
    <input class="fdate" type="number" id="yIn" placeholder="Year" min="2020" max="2099" style="max-width:90px;display:none"/>
    <button class="load-btn" onclick="loadExpenses()">Load</button>
  </div>

  <div class="sum-row">
    <div class="sum-card"><div class="sum-lbl">Total Spent</div><div class="sum-val r" id="sTotal">—</div></div>
    <div class="sum-card"><div class="sum-lbl">Entries</div><div class="sum-val" id="sCount">—</div></div>
  </div>

  <div class="sec-title" id="sTitle">Expenses</div>
  <div id="expList"><div class="loading"><div class="spinner"></div><p>Loading…</p></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
let expenses=[], bizName='', label='Expenses';
const catEmoji={'Rent':'🏠','Stock / Inventory':'📦','Transport':'🚗','Salaries':'👤','Utilities':'💡','Marketing':'📣','Equipment':'🔧','General':'💸','Other':'📝'};
const today=new Date(),pad=n=>String(n).padStart(2,'0');
const todayStr=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
document.getElementById('dIn').value=todayStr;
document.getElementById('mSel').value=today.getMonth()+1;
document.getElementById('yIn').value=today.getFullYear();

function onPChange(){
  const p=document.getElementById('pSel').value;
  document.getElementById('dIn').style.display  =p==='daily'  ?'':'none';
  document.getElementById('mSel').style.display =p==='monthly'?'':'none';
  document.getElementById('yIn').style.display  =p!=='daily'  ?'':'none';
  loadExpenses();
}
onPChange();

async function loadMe(){try{const r=await fetch('/api/me');if(r.status===401){window.location.href='/login';return;}const d=await r.json();if(d.ok){bizName=d.user.business_name;document.getElementById('bizSub').textContent=bizName;}}catch{}}

async function loadExpenses(){
  const p=document.getElementById('pSel').value;
  const params=new URLSearchParams({period:p});
  if(p==='daily')  params.set('date', document.getElementById('dIn').value||todayStr);
  if(p!=='daily')  params.set('year', document.getElementById('yIn').value||today.getFullYear());
  if(p==='monthly')params.set('month',document.getElementById('mSel').value||(today.getMonth()+1));
  document.getElementById('expList').innerHTML='<div class="loading"><div class="spinner"></div><p>Loading…</p></div>';
  try{
    const r=await fetch('/api/expenses?'+params);if(r.status===401){window.location.href='/login';return;}
    const d=await r.json();if(!d.ok)throw new Error(d.error);
    expenses=d.expenses;
    document.getElementById('sTotal').textContent='KES '+d.summary.total.toLocaleString();
    document.getElementById('sCount').textContent=d.summary.count;
    const months=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if(p==='daily')   label=`Expenses on ${document.getElementById('dIn').value}`;
    if(p==='monthly') label=`Expenses — ${months[document.getElementById('mSel').value]} ${document.getElementById('yIn').value}`;
    if(p==='yearly')  label=`Expenses — ${document.getElementById('yIn').value}`;
    document.getElementById('sTitle').textContent=label;
    document.getElementById('phBiz').textContent=bizName+' — Expenses';
    document.getElementById('phP').textContent=label;
    document.getElementById('phD').textContent='Printed: '+new Date().toLocaleString('en-KE');
    if(!d.expenses.length){document.getElementById('expList').innerHTML='<div class="empty"><div class="icon">📭</div><p>No expenses found.</p></div>';return;}
    document.getElementById('expList').innerHTML=d.expenses.map(e=>{
      const dt=new Date(e.created_at);
      return `<div class="exp-card" id="exp-${e.id}">
        <div class="ei">${catEmoji[e.category]||'💸'}</div>
        <div class="einf">
          <div class="edesc">${e.description}</div>
          <div class="ecat">${e.category}</div>
          ${e.note?`<div class="enote">${e.note}</div>`:''}
          <div class="etime">${dt.toLocaleDateString('en-GB')} · ${dt.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="er">
          <div class="eamt">−KES ${parseInt(e.amount).toLocaleString()}</div>
          <button class="edel" onclick="deleteExpense(${e.id})">Delete</button>
        </div>
      </div>`;
    }).join('');
  }catch(err){document.getElementById('expList').innerHTML=`<div class="empty"><div class="icon">⚠️</div><p>${err.message}</p></div>`;}
}

async function addExpense(){
  const desc=document.getElementById('eDesc').value.trim(),amount=parseInt(document.getElementById('eAmt').value)||0;
  const cat=document.getElementById('eCat').value,note=document.getElementById('eNote').value.trim();
  if(!desc){showToast('Please enter a description','error');return;}
  if(amount<=0){showToast('Please enter a valid amount','error');return;}
  const btn=document.getElementById('addBtn');btn.disabled=true;btn.textContent='Saving…';
  try{
    const r=await fetch('/api/expenses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:desc,amount,category:cat,note})});
    const d=await r.json();if(!d.ok)throw new Error(d.error);
    document.getElementById('eDesc').value='';document.getElementById('eAmt').value='';document.getElementById('eNote').value='';
    showToast('Expense recorded ✓');loadExpenses();
  }catch(e){showToast(e.message,'error');}
  btn.disabled=false;btn.textContent='Record Expense';
}

async function deleteExpense(id){
  if(!confirm('Delete this expense?'))return;
  try{await fetch(`/api/expenses/${id}`,{method:'DELETE'});showToast('Deleted');loadExpenses();}
  catch{showToast('Delete failed','error');}
}

function printPage(){document.getElementById('ph').style.display='block';window.print();setTimeout(()=>document.getElementById('ph').style.display='none',500);}

function downloadPDF(){
  if(!expenses.length){showToast('No expenses to download','error');return;}
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  doc.setFillColor(15,30,61);doc.rect(0,0,210,28,'F');
  doc.setTextColor(240,165,0);doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text(bizName||'Expenses',14,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(200,210,230);doc.text(label,14,20);doc.text('Generated: '+new Date().toLocaleString('en-KE'),196,20,{align:'right'});
  const total=expenses.reduce((s,e)=>s+parseInt(e.amount||0),0);
  doc.setFillColor(17,29,56);doc.roundedRect(14,32,85,16,2,2,'F');doc.roundedRect(111,32,85,16,2,2,'F');
  doc.setTextColor(107,127,168);doc.setFontSize(7);doc.text('TOTAL SPENT',18,37);doc.text('ENTRIES',115,37);
  doc.setTextColor(255,77,109);doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text('KES '+total.toLocaleString(),18,46);
  doc.setTextColor(240,165,0);doc.text(String(expenses.length),115,46);
  doc.autoTable({startY:54,head:[['Date','Description','Category','Note','Amount']],body:expenses.map(e=>[new Date(e.created_at).toLocaleDateString('en-GB'),e.description,e.category,e.note||'—','KES '+parseInt(e.amount).toLocaleString()]),styles:{fontSize:8,cellPadding:2.5,fillColor:[17,29,56],textColor:[232,237,248]},headStyles:{fillColor:[15,30,61],textColor:[240,165,0],fontStyle:'bold'},alternateRowStyles:{fillColor:[22,32,64]},columnStyles:{0:{cellWidth:25},1:{cellWidth:65},2:{cellWidth:35},3:{cellWidth:45},4:{cellWidth:26}},margin:{left:14,right:14}});
  const pc=doc.internal.getNumberOfPages();for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(107,127,168);doc.text(`Page ${i}/${pc}`,196,doc.internal.pageSize.height-7,{align:'right'});doc.text(bizName+' · Confidential',14,doc.internal.pageSize.height-7);}
  doc.save(`expenses-${label.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.pdf`);showToast('PDF downloaded ✓');
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
loadMe();loadExpenses();
</script>
</body>
</html>
