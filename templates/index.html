<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Uniform Shop POS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--navy:#0f1e3d;--gold:#f0a500;--gold2:#ffc93c;--green:#00c48c;--red:#ff4d6d;--bg:#080f20;--card:#111d38;--card2:#162040;--border:#1e2f52;--text:#e8edf8;--muted:#6b7fa8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.tb-name{font-size:16px;font-weight:700;}
.tb-sub{font-size:12px;color:var(--muted);}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-time{font-family:var(--mono);font-size:14px;color:var(--gold);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tb-btn{padding:6px 13px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .2s;}
.tb-btn:hover{border-color:var(--gold);color:var(--gold);}
.tb-btn.red:hover{border-color:var(--red);color:var(--red);}
.nav-tabs{display:flex;gap:3px;background:var(--bg);padding:8px 18px 0;border-bottom:1px solid var(--border);}
.nav-tab{padding:9px 18px;border-radius:9px 9px 0 0;border:1px solid transparent;background:none;color:var(--muted);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.nav-tab.active{background:var(--card);border-color:var(--border);border-bottom-color:var(--card);color:var(--text);}
.nav-tab:hover:not(.active){color:var(--text);}
.page{display:none;height:calc(100vh - 98px);overflow-y:auto;}
.page.active{display:block;}

/* POS */
.pos-wrap{display:grid;grid-template-columns:1fr 355px;height:100%;}
.prod-panel{padding:16px;overflow-y:auto;border-right:1px solid var(--border);}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.ph-title{font-size:18px;font-weight:700;}
.ph-actions{display:flex;gap:7px;}
.search-box{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 12px;width:185px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:12px;width:100%;}
.rf-btn{padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--gold);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.rf-btn:hover{border-color:var(--gold);}
.spinning .ri{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.cat-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .2s;}
.cat-btn.active,.cat-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;}
.pc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.pc:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 18px rgba(240,165,0,.15);}
.pc.sel{border-color:var(--gold);background:#1a2a10;}
.pc.oos{opacity:.4;pointer-events:none;}
.pc-emoji{font-size:28px;margin-bottom:7px;}
.pc-name{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3;}
.pc-cat{font-size:12px;color:var(--muted);margin-bottom:7px;}
.pc-price{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--gold);}
.pc-stock{position:absolute;top:8px;right:8px;font-size:11px;font-family:var(--mono);background:var(--bg);border-radius:4px;padding:2px 5px;color:var(--muted);}
.pc-stock.low{color:var(--red);}
.co-panel{background:var(--card);display:flex;flex-direction:column;}
.co-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700;}
.co-body{flex:1;overflow-y:auto;padding:14px 18px;}
.no-sel{text-align:center;padding:36px 16px;color:var(--muted);}
.no-sel .ic{font-size:46px;margin-bottom:8px;}
.si{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:14px;display:none;}
.si.vis{display:block;}
.si-name{font-weight:600;font-size:15px;margin-bottom:2px;}
.si-cat{font-size:12px;color:var(--muted);margin-bottom:9px;}
.si-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.si-lbl{font-size:13px;color:var(--muted);}
.qty-ctrl{display:flex;align-items:center;gap:7px;}
.qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.qty-inp{width:52px;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:14px;font-weight:600;padding:2px 4px;outline:none;}
.si-price{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold);}
.fg{margin-bottom:12px;}
.fl{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:4px;display:block;}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--gold);}
.fi::placeholder{color:var(--muted);}
.pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:3px;}
.pay-btn{padding:14px;border:none;border-radius:11px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.pay-btn.mp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);}
.pay-btn.cs{background:linear-gradient(135deg,var(--green),#00a876);color:var(--navy);}
.pay-btn:hover{transform:translateY(-1px);}
.pay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.rec-sales{border-top:1px solid var(--border);padding:12px 18px;max-height:165px;overflow-y:auto;}
.rs-ttl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.rs-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.rs-row:last-child{border-bottom:none;}
.rs-n{font-weight:500;}
.rs-m{color:var(--muted);font-size:12px;}
.rs-a{font-family:var(--mono);font-weight:600;}
.rs-a.mp{color:var(--gold);}
.rs-a.cs{color:var(--green);}

/* Shared page padding */
.pg{padding:18px;}

/* Cards */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:20px;font-weight:700;}
.add-btn{padding:10px 18px;border:none;border-radius:9px;background:var(--gold);color:var(--navy);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.add-btn:hover{background:var(--gold2);}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{background:var(--navy);padding:12px 16px;text-align:left;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--card2);}
.badge{padding:4px 10px;border-radius:5px;font-size:12px;font-weight:600;}
.badge.green{background:rgba(0,196,140,.15);color:var(--green);}
.badge.red{background:rgba(255,77,109,.15);color:var(--red);}
.badge.gold{background:rgba(240,165,0,.15);color:var(--gold);}
.icon-btn{padding:5px 9px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);cursor:pointer;font-size:12px;transition:all .2s;}
.icon-btn:hover{border-color:var(--red);color:var(--red);}
.icon-btn.edit:hover{border-color:var(--gold);color:var(--gold);}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:15px;}

/* Dashboard */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;}
.kpi-lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:700;}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.kpi-card.gr .kpi-val{color:var(--green);}
.kpi-card.gd .kpi-val{color:var(--gold);}
.kpi-card.rd .kpi-val{color:var(--red);}
.kpi-card.bl .kpi-val{color:#4fc3f7;}
.kpi-card.pu .kpi-val{color:#ce93d8;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;}
.chart-ttl{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--muted);}
.chart-wrap{position:relative;height:200px;}
.low-stock-alert{background:var(--card);border:1px solid var(--red);border-radius:13px;padding:16px;margin-bottom:18px;}
.lsa-ttl{font-size:14px;font-weight:600;color:var(--red);margin-bottom:10px;}
.lsa-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
.lsa-row:last-child{border-bottom:none;}

/* Settings */
.set-section{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:20px;margin-bottom:16px;}
.set-section-ttl{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.set-btn{padding:12px 22px;border:none;border-radius:10px;background:var(--gold);color:var(--navy);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.set-btn:hover{background:var(--gold2);}
.save-ok{font-size:13px;color:var(--green);margin-top:8px;display:none;}
.save-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:420px;max-width:95vw;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-tc{text-align:center;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:5px;}
.modal-sub{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.6;}
.modal-phone{font-family:var(--mono);font-size:19px;color:var(--gold);background:var(--bg);border-radius:9px;padding:9px 16px;margin-bottom:5px;}
.modal-amount{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--green);margin-bottom:18px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
.success-check{width:60px;height:60px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.fail-x{width:60px;height:60px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;}
.btn-ol{padding:11px 24px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text);font-family:var(--font);font-size:14px;cursor:pointer;margin:3px;}
.btn-ol:hover{border-color:var(--gold);color:var(--gold);}
.btn-pr{padding:11px 28px;border-radius:10px;border:none;background:var(--gold);color:var(--navy);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin:3px;}
.btn-pr:hover{background:var(--gold2);}
.btn-gr{padding:11px 24px;border-radius:10px;border:none;background:var(--green);color:var(--navy);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin:3px;}

/* Form modal */
.form-modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:480px;max-width:95vw;animation:slideUp .3s ease;}
.fm-title{font-size:18px;font-weight:700;margin-bottom:18px;}
.fm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fm-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.fm-btn{padding:11px 22px;border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;}
.fm-btn.primary{background:var(--gold);color:var(--navy);}
.fm-btn.cancel{background:none;border:1px solid var(--border);color:var(--text);}

/* Toast */
.toast{position:fixed;bottom:18px;right:18px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 18px;font-size:14px;box-shadow:0 8px 28px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .3s;z-index:300;max-width:280px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);}
.toast.error{border-color:var(--red);}

/* ── Mobile Responsive ── */
@media (max-width: 768px) {
  .topbar{padding:0 12px;height:50px;}
  .tb-name{font-size:12px;}
  .tb-sub{display:none;}
  .tb-time{display:none;}
  .tb-btn{padding:4px 8px;font-size:10px;}
  .nav-tabs{padding:6px 10px 0;gap:2px;overflow-x:auto;}
  .nav-tab{padding:6px 10px;font-size:11px;white-space:nowrap;}
  .page{height:calc(100vh - 90px);}

  /* POS — stack vertically on mobile */
  .pos-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .prod-panel{border-right:none;border-bottom:1px solid var(--border);max-height:45vh;padding:10px;}
  .co-panel{max-height:55vh;}
  .ph{flex-direction:column;align-items:flex-start;gap:8px;}
  .ph-actions{width:100%;justify-content:space-between;}
  .search-box{width:100%;}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .pc{padding:10px 8px;}
  .pc-emoji{font-size:20px;margin-bottom:5px;}
  .pc-name{font-size:10px;}
  .pc-price{font-size:12px;}
  .co-body{padding:10px 12px;}
  .rec-sales{max-height:120px;padding:8px 12px;}

  /* Dashboard */
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .kpi-val{font-size:15px;}
  .charts-grid{grid-template-columns:1fr;gap:10px;}
  .chart-wrap{height:180px;}

  /* Settings */
  .set-grid{grid-template-columns:1fr;}

  /* Tables — make scrollable */
  .table-wrap{overflow-x:auto;}
  .tbl{min-width:500px;}

  /* Form modal */
  .form-modal{width:95vw;padding:20px;}
  .fm-grid{grid-template-columns:1fr;}
  .modal{width:95vw;padding:20px;}

  /* Inventory/Expenses page */
  .pg{padding:10px;}
  .section-hdr{flex-wrap:wrap;gap:8px;}

  /* Checkout form */
  .pay-btns{grid-template-columns:1fr 1fr;}
  .si-price{font-size:16px;}
}

@media (max-width: 480px) {
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .kpi-val{font-size:14px;}
  .nav-tab{padding:5px 8px;font-size:10px;}
  .prod-grid{grid-template-columns:repeat(2,1fr);}
  .topbar{height:48px;}
  .tb-right{gap:4px;}
}

</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">🏫</div>
    <div>
      <div class="tb-name" id="tbBiz">Loading…</div>
      <div class="tb-sub" id="tbUser"></div>
    </div>
  </div>
  <div class="tb-right">
    <div class="dot"></div>
    <div class="tb-time" id="clock">--:--:--</div>
    <button class="tb-btn" onclick="goSettings()">⚙️ Settings</button>
    <button class="tb-btn red" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- Nav -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('pos',this)">🛒 Point of Sale</button>
  <button class="nav-tab" onclick="switchTab('inventory',this)">📦 Inventory</button>
  <button class="nav-tab" onclick="switchTab('expenses',this)">💸 Expenses</button>
  <button class="nav-tab" onclick="switchTab('dashboard',this)">📊 Dashboard</button>
  <button class="nav-tab" onclick="switchTab('settings',this)">⚙️ Settings</button>
</div>

<!-- POS -->
<div class="page active" id="page-pos">
  <div class="pos-wrap">
    <div class="prod-panel">
      <div class="ph">
        <div class="ph-title">Select Product</div>
        <div class="ph-actions">
          <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="Search…" oninput="filterProducts()"/></div>
          <button class="rf-btn" id="rfBtn" onclick="refreshProducts()"><span class="ri">🔄</span> Refresh</button>
        </div>
      </div>
      <div class="cats" id="catBtns"></div>
      <div class="prod-grid" id="prodGrid"><div style="color:var(--muted);padding:40px;grid-column:1/-1;text-align:center">Loading…</div></div>
    </div>
    <div class="co-panel">
      <div class="co-hdr">🛒 Checkout</div>
      <div class="co-body">
        <div class="no-sel" id="noSel"><div class="ic">👆</div><p>Select a product</p></div>
        <div class="si" id="selItem">
          <div class="si-name" id="siName"></div>
          <div class="si-cat" id="siCat"></div>
          <div class="si-row">
            <span class="si-lbl">Quantity</span>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <input type="number" class="qty-inp" id="qtyVal" value="1" min="1" oninput="manualQty(this.value)"/>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>
          <div class="si-row"><span class="si-lbl">Total</span><span class="si-price" id="siPrice">KES 0</span></div>
        </div>
        <div id="coForm" style="display:none">
          <div class="fg"><label class="fl">Customer Name (optional)</label><input class="fi" id="custName" type="text" placeholder="e.g. Jane Njeri"/></div>
          <div class="fg"><label class="fl">Customer M-Pesa Phone</label><input class="fi" id="custPhone" type="tel" placeholder="e.g. 0712 345 678"/></div>
          <div class="fg">
            <label class="fl">Receive Payment Via</label>
            <select class="fi" id="payDest">
              <option value="phone">📱 Personal M-Pesa Number</option>
              <option value="till">🏪 Till Number</option>
              <option value="paybill">🏦 Paybill</option>
            </select>
          </div>
          <div class="pay-btns">
            <button class="pay-btn mp" id="mpBtn" onclick="doPay('mpesa')">📱 M-Pesa</button>
            <button class="pay-btn cs" id="csBtn" onclick="doPay('cash')">💵 Cash</button>
          </div>
        </div>
      </div>
      <div class="rec-sales">
        <div class="rs-ttl">Recent Sales</div>
        <div id="recList"><div style="color:
