<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Uniform Shop — POS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0f1e3d;--gold:#f0a500;--gold2:#ffc93c;--green:#00c48c;--red:#ff4d6d;--bg:#080f20;--card:#111d38;--card2:#162040;--border:#1e2f52;--text:#e8edf8;--muted:#6b7fa8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;--topbar-h:60px;--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);height:100%;overflow:hidden;}
/* TOPBAR */
.topbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 16px;height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;}
.topbar-brand{display:flex;align-items:center;gap:10px;min-width:0;}
.topbar-logo{width:34px;height:34px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.topbar-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-sub{font-size:10px;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-time{font-family:var(--mono);font-size:12px;color:var(--gold);display:none;}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;}
.icon-btn.active,.icon-btn:hover{border-color:var(--gold);color:var(--gold);}
.badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:10px;min-width:18px;height:18px;display:none;align-items:center;justify-content:center;padding:0 4px;}
.badge.show{display:flex;}
/* DROPDOWN */
.dropdown{position:fixed;top:calc(var(--topbar-h)+6px);right:12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:8px;min-width:210px;z-index:500;box-shadow:0 12px 40px rgba(0,0,0,.5);transform:translateY(-8px) scale(.97);opacity:0;pointer-events:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.dropdown.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.dd-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text);text-decoration:none;}
.dd-item:hover,.dd-item.active{background:var(--card2);color:var(--gold);}
.dd-icon{font-size:18px;width:24px;text-align:center;}
.dd-div{height:1px;background:var(--border);margin:6px 0;}
.dd-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:6px 14px 2px;font-weight:600;}
.dd-backdrop{display:none;position:fixed;inset:0;z-index:400;}
.dd-backdrop.show{display:block;}
/* APP */
.app{position:fixed;top:var(--topbar-h);left:0;right:0;bottom:0;overflow:hidden;}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s cubic-bezier(.4,0,.2,1);}
#view-products{background:var(--bg);z-index:1;}
#view-cart{background:var(--card);z-index:2;transform:translateX(100%);opacity:.6;}
#view-cart.slide-in{transform:translateX(0);opacity:1;}
/* PRODUCTS */
.products-panel{padding:16px 16px calc(90px + var(--safe-bottom));}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;}
.panel-title{font-size:17px;font-weight:700;white-space:nowrap;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;flex:1;max-width:260px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:16px;width:100%;}
.search-box span{color:var(--muted);font-size:15px;flex-shrink:0;}
.cats{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.cat-btn.active,.cat-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .18s;position:relative;user-select:none;}
.product-card:active{transform:scale(.95);}
.product-card.in-cart{border-color:var(--gold);background:rgba(240,165,0,.07);}
.product-card.out-of-stock{opacity:.35;pointer-events:none;}
.card-qty{position:absolute;top:8px;right:8px;background:var(--gold);color:var(--navy);font-family:var(--mono);font-size:11px;font-weight:700;border-radius:10px;min-width:22px;height:22px;display:none;align-items:center;justify-content:center;padding:0 5px;}
.card-qty.show{display:flex;}
.p-stock{position:absolute;top:8px;left:8px;font-size:10px;font-family:var(--mono);background:var(--bg);border-radius:6px;padding:2px 6px;color:var(--muted);}
.p-stock.low{color:var(--red);}
.p-emoji{font-size:26px;margin:22px 0 8px;}
.p-name{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.p-cat{font-size:11px;color:var(--muted);margin-bottom:8px;}
.p-price{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);}
/* CART BAR */
.cart-bar{position:fixed;bottom:calc(16px + var(--safe-bottom));left:16px;right:16px;background:var(--gold);border-radius:16px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;z-index:100;box-shadow:0 8px 32px rgba(240,165,0,.4);transition:all .3s cubic-bezier(.34,1.56,.64,1);transform:translateY(100px);opacity:0;}
.cart-bar.show{transform:translateY(0);opacity:1;}
.cb-left{display:flex;align-items:center;gap:10px;}
.cb-count{background:var(--navy);color:var(--gold);font-family:var(--mono);font-size:12px;font-weight:700;border-radius:8px;padding:3px 8px;}
.cb-label{color:var(--navy);font-size:14px;font-weight:700;}
.cb-total{color:var(--navy);font-family:var(--mono);font-size:15px;font-weight:700;}
/* CART VIEW */
.cart-panel{display:flex;flex-direction:column;height:100%;min-height:0;}
.cart-topbar{display:flex;align-items:center;gap:12px;padding:16px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cart-title{font-size:16px;font-weight:700;flex:1;}
.clear-btn{font-size:12px;color:var(--red);cursor:pointer;padding:4px 8px;border:1px solid rgba(255,77,109,.3);border-radius:8px;background:none;font-family:var(--font);}
.cart-items{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;}
.cart-empty{text-align:center;padding:48px 20px;color:var(--muted);}
.cart-empty .icon{font-size:44px;margin-bottom:12px;}
.cart-empty p{font-size:14px;line-height:1.6;}
.cart-item{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.ci-emoji{font-size:24px;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-cat{font-size:11px;color:var(--muted);margin-top:1px;}
.ci-unit{font-size:11px;color:var(--muted);margin-top:3px;}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.ci-subtotal{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);}
.ci-qty{display:flex;align-items:center;gap:6px;}
.ci-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ci-btn:active{background:var(--gold);color:var(--navy);}
.ci-val{font-family:var(--mono);font-size:14px;font-weight:700;min-width:22px;text-align:center;}
.ci-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;}
.ci-del:hover{color:var(--red);}
/* ORDER SUMMARY */
.order-summary{border-top:1px solid var(--border);padding:14px 16px 0;flex-shrink:0;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px;}
.sum-row.total{font-size:16px;font-weight:700;color:var(--text);border-top:1px solid var(--border);padding-top:12px;margin-top:6px;}
.sum-row.total .amt{font-family:var(--mono);color:var(--gold);font-size:20px;}
/* CHECKOUT FORM */
.checkout-form{padding:16px;flex-shrink:0;}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:var(--font);font-size:16px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--muted);}
.pay-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.pay-btn:disabled{opacity:.5;cursor:not-allowed;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:32px 28px calc(32px + var(--safe-bottom));width:100%;max-width:480px;text-align:center;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-icon{font-size:52px;margin-bottom:14px;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.modal-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.modal-phone{font-family:var(--mono);font-size:20px;color:var(--gold);background:var(--bg);border-radius:12px;padding:10px 20px;margin-bottom:6px;}
.modal-amount{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--green);margin-bottom:20px;}
.modal-items{background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:14px;text-align:left;max-height:140px;overflow-y:auto;}
.mi-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border);}
.mi-row:last-child{border-bottom:none;}
.mi-amt{font-family:var(--mono);color:var(--gold);}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.success-check{width:68px;height:68px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.fail-x{width:68px;height:68px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;}
.btn-outline{padding:12px 24px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--text);font-family:var(--font);font-size:14px;cursor:pointer;margin:4px;}
.btn-primary{padding:12px 24px;border-radius:12px;border:none;background:var(--gold);color:var(--navy);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin:4px;}
/* TOAST */
.toast{position:fixed;bottom:calc(24px + var(--safe-bottom));left:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .3s;z-index:2000;text-align:center;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-color:var(--red);}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state .icon{font-size:44px;margin-bottom:12px;}
.empty-state p{font-size:14px;line-height:1.6;}
/* DESKTOP */
@media(min-width:700px){
  .topbar{padding:0 28px;}
  .topbar-time{display:block;}
  .icon-btn.mobile-only{display:none;}
  .dropdown{display:none!important;}
  .cart-bar{display:none;}
  .app{display:grid;grid-template-columns:1fr 400px;}
  #view-products,#view-cart{position:relative!important;transform:none!important;opacity:1!important;transition:none!important;z-index:auto!important;}
  #view-cart{border-left:1px solid var(--border);}
  .cart-topbar .back-btn{display:none;}
  .products-panel{padding:24px;}
  .modal-overlay{align-items:center;}
  .modal{border-radius:24px;}
  .toast{left:auto;right:24px;width:300px;text-align:left;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">🏫</div>
    <div>
      <div class="topbar-name" id="bizName">School Uniforms</div>
      <div class="topbar-sub">Point of Sale</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="dot"></div>
    <div class="topbar-time" id="clock"></div>
    <button class="icon-btn mobile-only" id="cartBtn" onclick="goToCart()">🛒<span class="badge" id="cartBadge">0</span></button>
    <button class="icon-btn mobile-only" onclick="toggleMenu()" aria-label="Menu">☰</button>
  </div>
</div>

<div class="dd-backdrop" id="ddBackdrop" onclick="closeMenu()"></div>
<div class="dropdown" id="dropdown">
  <div class="dd-label">Sell</div>
  <div class="dd-item active"><span class="dd-icon">🏪</span>Products</div>
  <div class="dd-div"></div>
  <div class="dd-label">Records</div>
  <a class="dd-item" href="/sales"><span class="dd-icon">📋</span>Sales Records</a>
  <a class="dd-item" href="/expenses"><span class="dd-icon">💸</span>Expenses</a>
  <div class="dd-div"></div>
  <div class="dd-label">Manage</div>
  <a class="dd-item" href="/inventory"><span class="dd-icon">📦</span>Inventory</a>
  <div class="dd-div"></div>
  <div class="dd-item" onclick="doLogout()"><span class="dd-icon">🚪</span>Logout</div>
</div>

<div class="app">
  <!-- PRODUCTS -->
  <div class="view" id="view-products">
    <div class="products-panel">
      <div class="panel-header">
        <div class="panel-title">Products</div>
        <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="Search…" oninput="filterProducts()" autocomplete="off"/></div>
      </div>
      <!-- Desktop nav links -->
      <div style="display:none" class="desktop-nav" id="desktopNav">
        <a href="/sales" style="color:var(--muted);font-size:13px;margin-right:16px;text-decoration:none;">📋 Sales Records</a>
        <a href="/expenses" style="color:var(--muted);font-size:13px;margin-right:16px;text-decoration:none;">💸 Expenses</a>
        <a href="/inventory" style="color:var(--muted);font-size:13px;text-decoration:none;">📦 Inventory</a>
      </div>
      <div class="cats" id="catBtns"></div>
      <div class="products-grid" id="productsGrid">
        <div class="empty-state" style="grid-column:1/-1"><div class="icon">⏳</div><p>Loading…</p></div>
      </div>
    </div>
    <div class="cart-bar" id="cartBar" onclick="goToCart()">
      <div class="cb-left"><span class="cb-count" id="cbCount">0</span><span class="cb-label">View Cart</span></div>
      <span class="cb-total" id="cbTotal">KES 0</span>
    </div>
  </div>

  <!-- CART -->
  <div class="view" id="view-cart">
    <div class="cart-panel">
      <div class="cart-topbar">
        <button class="back-btn" onclick="goToProducts()">‹</button>
        <div class="cart-title">🛒 Cart</div>
        <button class="clear-btn" onclick="clearCart()">Clear all</button>
      </div>
      <div class="cart-items" id="cartItems"><div class="cart-empty"><div class="icon">🛒</div><p>Tap products to add them.</p></div></div>
      <div class="order-summary" id="orderSummary" style="display:none">
        <div class="sum-row"><span id="sumCount">0 items</span><span id="sumSub">KES 0</span></div>
        <div class="sum-row total"><span>Total</span><span class="amt" id="sumTotal">KES 0</span></div>
      </div>
      <div class="checkout-form" id="checkoutForm" style="display:none">
        <div class="form-group">
          <label class="form-label">Customer Name (optional)</label>
          <input class="form-input" id="custName" type="text" placeholder="e.g. Jane Njeri" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Customer M-Pesa Phone *</label>
          <input class="form-input" id="custPhone" type="tel" placeholder="e.g. 0712 345 678" maxlength="13"/>
        </div>
        <button class="pay-btn" id="payBtn" onclick="initiatePayment()">
          <span>📱</span><span id="payLabel">Send M-Pesa Prompt</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div id="modalContent"></div></div></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
let products=[], cart={}, pollTimer=null;
const isDesktop=()=>window.innerWidth>=700;
const emojiMap={Tops:'👕',Bottoms:'👖',Outerwear:'🧥',Sportswear:'🩳',Footwear:'👟',Accessories:'🎒',default:'📦'};
const emoji=c=>emojiMap[c]||emojiMap.default;

// Clock
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(updateClock,1000);updateClock();

// Show desktop nav links
if(isDesktop())document.getElementById('desktopNav').style.display='block';

// Menu
function toggleMenu(){const dd=document.getElementById('dropdown'),bd=document.getElementById('ddBackdrop'),o=dd.classList.toggle('open');bd.classList.toggle('show',o);}
function closeMenu(){document.getElementById('dropdown').classList.remove('open');document.getElementById('ddBackdrop').classList.remove('show');}
async function doLogout(){await fetch('/api/logout',{method:'POST'});window.location.href='/login';}

// Nav
function goToCart(){if(!isDesktop()){document.getElementById('view-cart').classList.add('slide-in');history.pushState({cart:true},'');}}
function goToProducts(){document.getElementById('view-cart').classList.remove('slide-in');}
window.addEventListener('popstate',()=>{if(!isDesktop())goToProducts();});

// Load products
async function loadProducts(){
  try{
    const r=await fetch('/api/products');
    if(r.status===401){window.location.href='/login';return;}
    const d=await r.json();
    if(!d.ok)throw new Error(d.error);
    products=d.products;
    renderCats();renderProducts(products);
  }catch(e){
    document.getElementById('productsGrid').innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
  }
}
function renderCats(){
  const cats=['All',...new Set(products.map(p=>p.category).filter(Boolean))];
  document.getElementById('catBtns').innerHTML=cats.map((c,i)=>`<button class="cat-btn ${i===0?'active':''}" onclick="filterCat('${c}',this)">${c}</button>`).join('');
}
function renderProducts(list){
  const g=document.getElementById('productsGrid');
  if(!list.length){g.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>No products found</p></div>`;return;}
  g.innerHTML=list.map(p=>{
    const k=String(p.id||p.name),qty=cart[k]?.qty||0,oos=(p.stock||0)<=0,low=p.stock>0&&p.stock<=(p.reorder||0);
    return `<div class="product-card ${oos?'out-of-stock':''} ${qty>0?'in-cart':''}" id="card-${k}" onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="p-stock ${low?'low':''}">${oos?'OUT':'×'+p.stock}</div>
      <div class="card-qty ${qty>0?'show':''}" id="bub-${k}">${qty}</div>
      <div class="p-emoji">${emoji(p.category)}</div>
      <div class="p-name">${p.name}</div>
      <div class="p-cat">${p.category}</div>
      <div class="p-price">KES ${parseInt(p.price).toLocaleString()}</div>
    </div>`;
  }).join('');
}
function filterCat(cat,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProducts(cat==='All'?products:products.filter(p=>p.category===cat));}
function filterProducts(){const q=document.getElementById('searchInput').value.toLowerCase();renderProducts(products.filter(p=>p.name.toLowerCase().includes(q)));}

// CART
function cartKey(p){return String(p.id||p.name);}
function addToCart(p){
  const k=cartKey(p),max=parseInt(p.stock)||99;
  if(cart[k]){if(cart[k].qty>=max){showToast(`Only ${max} in stock`,'error');return;}cart[k].qty++;}
  else cart[k]={product:p,qty:1};
  const card=document.getElementById(`card-${k}`);
  if(card){card.style.transform='scale(.93)';setTimeout(()=>card.style.transform='',150);}
  updateCartUI();
}
function changeQty(k,d){if(!cart[k])return;cart[k].qty+=d;if(cart[k].qty<=0)delete cart[k];updateCartUI();}
function removeItem(k){delete cart[k];updateCartUI();}
function clearCart(){if(!Object.keys(cart).length)return;if(!confirm('Clear cart?'))return;cart={};updateCartUI();}
function cartTotal(){return Object.values(cart).reduce((s,e)=>s+e.product.price*e.qty,0);}
function cartCount(){return Object.values(cart).reduce((s,e)=>s+e.qty,0);}

function updateCartUI(){
  const count=cartCount(),total=cartTotal();
  // card bubbles
  products.forEach(p=>{
    const k=cartKey(p),bub=document.getElementById(`bub-${k}`),card=document.getElementById(`card-${k}`);
    if(bub){const q=cart[k]?.qty||0;bub.textContent=q;bub.classList.toggle('show',q>0);}
    if(card)card.classList.toggle('in-cart',!!cart[k]);
  });
  // topbar badge
  const badge=document.getElementById('cartBadge');
  badge.textContent=count;badge.classList.toggle('show',count>0);
  document.getElementById('cartBtn').classList.toggle('active',count>0);
  // cart bar
  const bar=document.getElementById('cartBar');
  bar.classList.toggle('show',count>0);
  document.getElementById('cbCount').textContent=count;
  document.getElementById('cbTotal').textContent='KES '+total.toLocaleString();
  // pay button label
  document.getElementById('payLabel').textContent=`Send M-Pesa Prompt — KES ${total.toLocaleString()}`;
  // cart items panel
  renderCartItems();
  const has=count>0;
  document.getElementById('orderSummary').style.display=has?'':'none';
  document.getElementById('checkoutForm').style.display=has?'':'none';
  if(has){
    const n=Object.keys(cart).length;
    document.getElementById('sumCount').textContent=`${n} item${n>1?'s':''}`;
    document.getElementById('sumSub').textContent='KES '+total.toLocaleString();
    document.getElementById('sumTotal').textContent='KES '+total.toLocaleString();
  }
}
function renderCartItems(){
  const c=document.getElementById('cartItems'),entries=Object.entries(cart);
  if(!entries.length){c.innerHTML=`<div class="cart-empty"><div class="icon">🛒</div><p>Tap products to add them.</p></div>`;return;}
  c.innerHTML=entries.map(([k,e])=>`
    <div class="cart-item">
      <div class="ci-emoji">${emoji(e.product.category)}</div>
      <div class="ci-info">
        <div class="ci-name">${e.product.name}</div>
        <div class="ci-cat">${e.product.category}</div>
        <div class="ci-unit">KES ${parseInt(e.product.price).toLocaleString()} each</div>
      </div>
      <div class="ci-right">
        <div class="ci-subtotal">KES ${(e.product.price*e.qty).toLocaleString()}</div>
        <div class="ci-qty">
          <button class="ci-btn" onclick="changeQty('${k}',-1)">−</button>
          <span class="ci-val">${e.qty}</span>
          <button class="ci-btn" onclick="changeQty('${k}',1)">+</button>
        </div>
      </div>
      <button class="ci-del" onclick="removeItem('${k}')">✕</button>
    </div>`).join('');
}

// PAYMENT
async function initiatePayment(){
  const phone=document.getElementById('custPhone').value.trim();
  const customer=document.getElementById('custName').value.trim()||'Walk-in';
  if(!phone){showToast('Please enter customer phone','error');return;}
  if(!Object.keys(cart).length){showToast('Cart is empty','error');return;}
  document.getElementById('payBtn').disabled=true;
  const total=cartTotal();
  const items=Object.values(cart).map(e=>({product:e.product,qty:e.qty}));
  showModal('waiting',phone,total,items);
  try{
    const r=await fetch('/api/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,customer,items,total})});
    const d=await r.json();
    if(!d.ok){showModal('error',null,null,null,d.error);document.getElementById('payBtn').disabled=false;return;}
    pollPayment(d.checkout_id);
  }catch(e){showModal('error',null,null,null,e.message);document.getElementById('payBtn').disabled=false;}
}
function pollPayment(ckid){
  let attempts=0;
  pollTimer=setInterval(async()=>{
    attempts++;
    try{
      const r=await fetch('/api/status/'+ckid);
      const d=await r.json();
      if(d.status==='completed'){
        clearInterval(pollTimer);showModal('success');
        document.getElementById('payBtn').disabled=false;
        setTimeout(()=>{cart={};updateCartUI();document.getElementById('custPhone').value='';document.getElementById('custName').value='';closeModal();loadProducts();if(!isDesktop())goToProducts();},3500);
      }
      if(d.status==='failed'){clearInterval(pollTimer);showModal('error',null,null,null,d.reason||'Payment failed.');document.getElementById('payBtn').disabled=false;}
    }catch{}
    if(attempts>=40){clearInterval(pollTimer);showModal('error',null,null,null,'Payment timed out.');document.getElementById('payBtn').disabled=false;}
  },3000);
}
function showModal(state,phone,amount,items,err){
  document.getElementById('modalOverlay').classList.add('show');
  const c=document.getElementById('modalContent');
  if(state==='waiting'){
    const rows=items.map(i=>`<div class="mi-row"><span>${i.product.name} ×${i.qty}</span><span class="mi-amt">KES ${(i.product.price*i.qty).toLocaleString()}</span></div>`).join('');
    c.innerHTML=`<div class="modal-icon">📱</div><div class="modal-title">Awaiting Payment</div><div class="modal-sub">M-Pesa prompt sent to</div><div class="modal-phone">${phone}</div><div class="modal-items">${rows}</div><div class="modal-amount">KES ${parseInt(amount).toLocaleString()}</div><div class="spinner"></div><div style="color:var(--muted);font-size:13px;margin-bottom:20px">Ask customer to enter M-Pesa PIN</div><button class="btn-outline" onclick="cancelPayment()">Cancel</button>`;
  }else if(state==='success'){
    c.innerHTML=`<div class="success-check">✓</div><div class="modal-title">Payment Received!</div><div class="modal-sub">Sale recorded. Stock updated.</div><div style="color:var(--green);font-family:var(--mono);font-size:22px;margin-bottom:20px">✅ PAID</div>`;
  }else if(state==='error'){
    c.innerHTML=`<div class="fail-x">✕</div><div class="modal-title">Payment Failed</div><div class="modal-sub">${err||'Something went wrong.'}</div><button class="btn-primary" onclick="closeModal()">Try Again</button>`;
  }
}
function cancelPayment(){clearInterval(pollTimer);closeModal();document.getElementById('payBtn').disabled=false;}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}

async function loadMe(){try{const r=await fetch('/api/me');if(r.status===401){window.location.href='/login';return;}const d=await r.json();if(d.ok)document.getElementById('bizName').textContent=d.user.business_name;}catch{}}

loadMe();loadProducts();
</script>
