<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Sales Records</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--navy:#0f1e3d;--gold:#f0a500;--gold2:#ffc93c;--green:#00c48c;--red:#ff4d6d;--bg:#080f20;--card:#111d38;--card2:#162040;--border:#1e2f52;--text:#e8edf8;--muted:#6b7fa8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;--h:60px;--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100%;}
.topbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 16px;height:var(--h);display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;}
.tl{display:flex;align-items:center;gap:12px;}
.back{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.pt{font-size:15px;font-weight:700;}
.ps{font-size:10px;color:var(--muted);}
.tr{display:flex;gap:8px;}
.ib{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ib:hover{border-color:var(--gold);color:var(--gold);}
.main{margin-top:var(--h);padding:18px 16px calc(24px + var(--sb));max-width:920px;margin-left:auto;margin-right:auto;}
.tabs{display:flex;gap:8px;margin-bottom:18px;}
.tab{padding:7px 16px;border-radius:18px;font-size:13px;font-weight:600;text-decoration:none;color:var(--muted);border:1px solid var(--border);background:var(--card);}
.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
/* FILTER */
.filter-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px;}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.filter-row:last-child{margin-bottom:0;}
.fsel,.finput{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;}
.fsel{cursor:pointer;}
.finput{flex:1;min-width:120px;}
.finput::placeholder{color:var(--muted);}
.finput:focus,.fsel:focus{border-color:var(--gold);}
.load-btn{background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:9px 16px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--muted);}
/* SUMMARY */
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;}
.sum-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.sum-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--gold);}
.sum-val.g{color:var(--green);}
/* SALES LIST */
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.sale-card{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:9px;overflow:hidden;}
.sale-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;}
.s-left{}
.s-txn{font-family:var(--mono);font-size:11px;color:var(--muted);}
.s-cust{font-size:14px;font-weight:600;margin:2px 0;}
.s-time{font-size:11px;color:var(--muted);}
.s-right{text-align:right;}
.s-amt{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--green);}
.s-code{font-size:11px;color:var(--muted);margin-top:2px;}
.s-arrow{font-size:15px;color:var(--muted);margin-left:8px;transition:transform .2s;}
.s-arrow.open{transform:rotate(90deg);}
.sale-body{display:none;border-top:1px solid var(--border);padding:12px 15px;background:var(--card2);}
.sale-body.show{display:block;}
.item-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-qty{color:var(--muted);margin-left:4px;}
.item-sub{font-family:var(--mono);color:var(--gold);}
.sale-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.sale-meta span{font-size:11px;color:var(--muted);}
.refund-btn{font-size:12px;color:var(--red);cursor:pointer;padding:4px 10px;border:1px solid rgba(255,77,109,.3);border-radius:7px;background:none;font-family:var(--font);margin-top:8px;}
.refund-btn:hover{background:rgba(255,77,109,.1);}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:26px 22px calc(26px + var(--sb));width:100%;max-width:480px;animation:up .3s ease;}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px;display:block;}
.form-input,.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:10px;margin-top:6px;}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:11px;background:none;color:var(--text);font-family:var(--font);font-size:14px;cursor:pointer;}
.btn-red{flex:2;padding:12px;border:none;border-radius:11px;background:var(--red);color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;}
.btn-red:disabled{opacity:.5;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .icon{font-size:40px;margin-bottom:10px;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(20px + var(--sb));left:16px;right:16px;background:var(--card);border:1px solid var(--green);border-radius:13px;padding:13px 16px;font-size:14px;text-align:center;transform:translateY(80px);opacity:0;transition:all .3s;z-index:2000;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-color:var(--red);}
.print-header{display:none;text-align:center;margin-bottom:16px;}
@media print{body{background:#fff;color:#000;}.topbar,.tabs,.filter-card,.tr,.ib,.refund-btn,.s-arrow{display:none!important;}.main{margin-top:0;padding:16px;}.print-header{display:block!important;}.sale-body{display:block!important;background:#f5f5f5;}.sale-card{border:1px solid #ccc;break-inside:avoid;}.s-amt{color:#000;}}
@media(min-width:700px){.main{padding:26px;}.sum-row{grid-template-columns:repeat(4,1fr);}.overlay{align-items:center;}.modal{border-radius:22px;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">
    <a class="back" href="/">‹</a>
    <div><div class="pt">📋 Sales Records</div><div class="ps" id="bizSub">—</div></div>
  </div>
  <div class="tr">
    <button class="ib" onclick="printPage()" title="Print">🖨️</button>
    <button class="ib" onclick="downloadPDF()" title="PDF">⬇️</button>
  </div>
</div>

<div class="main">
  <div class="print-header" id="printHeader">
    <h2 id="phBiz">Sales Records</h2><p id="phPeriod">—</p><p id="phDate">—</p>
  </div>
  <div class="tabs">
    <a class="tab active" href="/sales">Sales Records</a>
    <a class="tab" href="/expenses">Expenses</a>
  </div>

  <div class="filter-card">
    <div class="filter-row">
      <select class="fsel" id="periodSel" onchange="onPeriodChange()">
        <option value="daily">Daily</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
        <option value="range">Date Range</option>
      </select>
      <input class="finput" type="date" id="dateIn" style="display:none"/>
      <select class="fsel" id="monthSel" style="display:none">
        <option value="1">January</option><option value="2">February</option><option value="3">March</option>
        <option value="4">April</option><option value="5">May</option><option value="6">June</option>
        <option value="7">July</option><option value="8">August</option><option value="9">September</option>
        <option value="10">October</option><option value="11">November</option><option value="12">December</option>
      </select>
      <input class="finput" type="number" id="yearIn" placeholder="Year" min="2020" max="2099" style="max-width:90px;display:none"/>
      <input class="finput" type="date" id="fromIn" placeholder="From" style="display:none"/>
      <input class="finput" type="date" id="toIn" placeholder="To" style="display:none"/>
      <button class="load-btn" onclick="loadSales()">Load</button>
    </div>
    <div class="filter-row">
      <input class="search-input" id="searchIn" placeholder="🔍  Search by customer, item, M-Pesa code…" oninput="filterSales()"/>
    </div>
  </div>

  <div class="sum-row">
    <div class="sum-card"><div class="sum-lbl">Total Revenue</div><div class="sum-val g" id="sumRev">—</div></div>
    <div class="sum-card"><div class="sum-lbl">Transactions</div><div class="sum-val" id="sumTxn">—</div></div>
    <div class="sum-card"><div class="sum-lbl">VAT Collected</div><div class="sum-val" id="sumVat">—</div></div>
    <div class="sum-card"><div class="sum-lbl">Discounts Given</div><div class="sum-val" style="color:var(--red)" id="sumDisc">—</div></div>
  </div>

  <div class="sec-title" id="secTitle">Sales</div>
  <div id="salesList"><div class="loading"><div class="spinner"></div><p>Loading…</p></div></div>
</div>

<!-- Refund Modal -->
<div class="overlay" id="refundOverlay">
  <div class="modal">
    <div class="modal-title">↩️ Process Refund</div>
    <div class="form-group">
      <label class="form-label">Sale being refunded</label>
      <div id="refundSaleInfo" style="font-size:13px;color:var(--muted);padding:10px;background:var(--bg);border-radius:9px;border:1px solid var(--border);">—</div>
    </div>
    <div class="form-group">
      <label class="form-label">Reason for refund *</label>
      <select class="form-select" id="refundReason">
        <option value="Customer return">Customer return</option>
        <option value="Wrong item">Wrong item</option>
        <option value="Defective product">Defective product</option>
        <option value="Overcharge">Overcharge</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Additional notes</label>
      <input class="form-input" id="refundNote" type="text" placeholder="Optional notes…"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeRefund()">Cancel</button>
      <button class="btn-red" id="refundBtn" onclick="submitRefund()">Process Refund</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
let allSales=[], filteredSales=[], refundSaleId=null, bizName='', periodLabel='Sales';
const today=new Date(), pad=n=>String(n).padStart(2,'0');
const todayStr=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
document.getElementById('dateIn').value=todayStr;
document.getElementById('monthSel').value=today.getMonth()+1;
document.getElementById('yearIn').value=today.getFullYear();
document.getElementById('fromIn').value=todayStr;
document.getElementById('toIn').value=todayStr;

function onPeriodChange(){
  const p=document.getElementById('periodSel').value;
  document.getElementById('dateIn').style.display   = p==='daily'  ?'':'none';
  document.getElementById('monthSel').style.display = p==='monthly'?'':'none';
  document.getElementById('yearIn').style.display   = (p==='monthly'||p==='yearly')?'':'none';
  document.getElementById('fromIn').style.display   = p==='range'  ?'':'none';
  document.getElementById('toIn').style.display     = p==='range'  ?'':'none';
  loadSales();
}
onPeriodChange();

async function loadMe(){try{const r=await fetch('/api/me');if(r.status===401){window.location.href='/login';return;}const d=await r.json();if(d.ok){bizName=d.user.business_name;document.getElementById('bizSub').textContent=bizName;}}catch{}}

async function loadSales(){
  const p=document.getElementById('periodSel').value;
  const params=new URLSearchParams({period:p});
  if(p==='daily')   params.set('date',  document.getElementById('dateIn').value||todayStr);
  if(p==='monthly'||p==='yearly') params.set('year', document.getElementById('yearIn').value||today.getFullYear());
  if(p==='monthly') params.set('month', document.getElementById('monthSel').value||(today.getMonth()+1));
  if(p==='range'){  params.set('from', document.getElementById('fromIn').value);params.set('to', document.getElementById('toIn').value);}
  document.getElementById('salesList').innerHTML='<div class="loading"><div class="spinner"></div><p>Loading…</p></div>';
  try{
    const r=await fetch('/api/sales?'+params);if(r.status===401){window.location.href='/login';return;}
    const d=await r.json();if(!d.ok)throw new Error(d.error);
    allSales=d.sales;
    const months=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if(p==='daily')   periodLabel=`Sales on ${document.getElementById('dateIn').value}`;
    if(p==='monthly') periodLabel=`Sales — ${months[document.getElementById('monthSel').value]} ${document.getElementById('yearIn').value}`;
    if(p==='yearly')  periodLabel=`Sales — ${document.getElementById('yearIn').value}`;
    if(p==='range')   periodLabel=`Sales ${document.getElementById('fromIn').value} to ${document.getElementById('toIn').value}`;
    document.getElementById('secTitle').textContent=periodLabel;
    document.getElementById('phBiz').textContent=bizName+' — Sales Records';
    document.getElementById('phPeriod').textContent=periodLabel;
    document.getElementById('phDate').textContent='Printed: '+new Date().toLocaleString('en-KE');
    updateSummary(d.summary);
    filterSales();
  }catch(e){document.getElementById('salesList').innerHTML=`<div class="empty"><div class="icon">⚠️</div><p>${e.message}</p></div>`;}
}

function updateSummary(s){
  document.getElementById('sumRev').textContent='KES '+(s.total_revenue||0).toLocaleString();
  document.getElementById('sumTxn').textContent=s.total_transactions||0;
  document.getElementById('sumVat').textContent='KES '+(s.total_vat||0).toLocaleString();
  document.getElementById('sumDisc').textContent='KES '+(s.total_discounts||0).toLocaleString();
}

function filterSales(){
  const q=document.getElementById('searchIn').value.toLowerCase();
  filteredSales=q?allSales.filter(s=>{
    const items=Array.isArray(s.items)?s.items:[];
    return s.customer?.toLowerCase().includes(q)||
           s.mpesa_code?.toLowerCase().includes(q)||
           s.txn_id?.toLowerCase().includes(q)||
           items.some(i=>i.name?.toLowerCase().includes(q));
  }):allSales;
  renderSales();
}

function renderSales(){
  if(!filteredSales.length){document.getElementById('salesList').innerHTML='<div class="empty"><div class="icon">📭</div><p>No sales found.</p></div>';return;}
  document.getElementById('salesList').innerHTML=filteredSales.map((s,i)=>{
    const dt=new Date(s.created_at);
    const items=Array.isArray(s.items)?s.items.filter(x=>x&&x.name):[];
    return `<div class="sale-card">
      <div class="sale-hdr" onclick="toggleSale(${i})">
        <div class="s-left">
          <div class="s-txn">${s.txn_id} ${s.cashier_name?'· '+s.cashier_name:''}</div>
          <div class="s-cust">${s.customer}</div>
          <div class="s-time">${dt.toLocaleDateString('en-GB')} · ${dt.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="s-right">
          <div class="s-amt">KES ${parseInt(s.total_amount).toLocaleString()}</div>
          <div class="s-code">${s.mpesa_code||''}</div>
        </div>
        <span class="s-arrow" id="arr-${i}">›</span>
      </div>
      <div class="sale-body" id="body-${i}">
        ${items.map(it=>`<div class="item-row"><span>${it.name}<span class="item-qty">×${it.qty}</span></span><span class="item-sub">KES ${parseInt(it.subtotal||0).toLocaleString()}</span></div>`).join('')}
        <div class="sale-meta">
          ${s.vat_amount>0?`<span>VAT: KES ${parseInt(s.vat_amount).toLocaleString()}</span>`:''}
          ${s.discount>0?`<span>Discount: KES ${parseInt(s.discount).toLocaleString()}</span>`:''}
          ${s.price_tier&&s.price_tier!=='retail'?`<span>Tier: ${s.price_tier}</span>`:''}
        </div>
        <button class="refund-btn" onclick="openRefund(${s.id},'${s.txn_id}','${s.customer}',${s.total_amount})">↩️ Refund this sale</button>
      </div>
    </div>`;
  }).join('');
}

function toggleSale(i){document.getElementById(`body-${i}`).classList.toggle('show');document.getElementById(`arr-${i}`).classList.toggle('open');}

function openRefund(id,txn,customer,amount){
  refundSaleId=id;
  document.getElementById('refundSaleInfo').textContent=`${txn} · ${customer} · KES ${parseInt(amount).toLocaleString()}`;
  document.getElementById('refundNote').value='';
  document.getElementById('refundOverlay').classList.add('show');
}
function closeRefund(){document.getElementById('refundOverlay').classList.remove('show');refundSaleId=null;}

async function submitRefund(){
  if(!refundSaleId)return;
  const reason=document.getElementById('refundReason').value;
  const note=document.getElementById('refundNote').value.trim();
  const btn=document.getElementById('refundBtn');btn.disabled=true;btn.textContent='Processing…';
  try{
    const r=await fetch('/api/refunds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sale_id:refundSaleId,reason,note})});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error);
    showToast('Refund processed. Stock restored. ✓');
    closeRefund();loadSales();
  }catch(e){showToast(e.message,'error');}
  btn.disabled=false;btn.textContent='Process Refund';
}

function printPage(){document.getElementById('printHeader').style.display='block';window.print();setTimeout(()=>document.getElementById('printHeader').style.display='none',500);}

function downloadPDF(){
  if(!filteredSales.length){showToast('No sales to download','error');return;}
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  doc.setFillColor(15,30,61);doc.rect(0,0,210,28,'F');
  doc.setTextColor(240,165,0);doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text(bizName||'Sales Records',14,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(200,210,230);doc.text(periodLabel,14,19);doc.text('Generated: '+new Date().toLocaleString('en-KE'),196,19,{align:'right'});
  const totalRev=filteredSales.reduce((s,r)=>s+parseInt(r.total_amount||0),0);
  doc.setFillColor(17,29,56);doc.roundedRect(14,32,85,16,2,2,'F');doc.roundedRect(111,32,85,16,2,2,'F');
  doc.setTextColor(107,127,168);doc.setFontSize(7);doc.text('TOTAL REVENUE',18,37);doc.text('TRANSACTIONS',115,37);
  doc.setTextColor(0,196,140);doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text('KES '+totalRev.toLocaleString(),18,46);
  doc.setTextColor(240,165,0);doc.text(String(filteredSales.length),115,46);
  const rows=filteredSales.map(s=>{
    const items=Array.isArray(s.items)?s.items.filter(x=>x&&x.name):[];
    const dt=new Date(s.created_at);
    return[s.txn_id,dt.toLocaleDateString('en-GB'),s.customer,items.map(i=>`${i.name}×${i.qty}`).join(', ')||'—','KES '+parseInt(s.total_amount).toLocaleString(),s.mpesa_code||'—'];
  });
  doc.autoTable({startY:54,head:[['TXN','Date','Customer','Items','Amount','M-Pesa']],body:rows,styles:{fontSize:8,cellPadding:2.5,fillColor:[17,29,56],textColor:[232,237,248]},headStyles:{fillColor:[15,30,61],textColor:[240,165,0],fontStyle:'bold'},alternateRowStyles:{fillColor:[22,32,64]},columnStyles:{0:{cellWidth:22},1:{cellWidth:22},2:{cellWidth:30},3:{cellWidth:58},4:{cellWidth:24},5:{cellWidth:26}},margin:{left:14,right:14}});
  const pc=doc.internal.getNumberOfPages();for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(107,127,168);doc.text(`Page ${i}/${pc}`,196,doc.internal.pageSize.height-7,{align:'right'});doc.text(bizName+' · Confidential',14,doc.internal.pageSize.height-7);}
  doc.save(`sales-${periodLabel.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.pdf`);
  showToast('PDF downloaded ✓');
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
loadMe();loadSales();
</script>
</body>
</html>
